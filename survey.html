<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>多维问卷 - 宿舍智能推荐与管理系统</title>
    <link href="css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        /* 核心布局 */
        #layoutSidenav {
            display: flex;
            width: 100%;
            min-height: calc(100vh - 56px);
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #layoutSidenav_nav {
            width: 225px;
            flex-shrink: 0;
            transition: transform 0.3s ease-in-out;
            position: relative;
            z-index: 100;
            background-color: #212529;
        }
        #layoutSidenav_content {
            flex: 1;
            transition: all 0.3s ease-in-out;
            overflow-x: hidden;
        }
        #layoutSidenav.sb-sidenav-toggled #layoutSidenav_nav {
            transform: translateX(-225px);
        }
        .content-wrapper {
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
            padding: 0 1rem;
            transition: all 0.3s ease-in-out;
        }
        #layoutSidenav.sb-sidenav-toggled .content-wrapper {
            max-width: 100%;
            padding: 0;
        }
        .form-card {
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="sb-nav-fixed">
    <!-- 顶部导航栏 -->
    <nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark">

            <i class="fas fa-bars text-white"></i>
        </button>
        <a class="navbar-brand" href="index.html">宿舍智能推荐与管理系统</a>
        <ul class="navbar-nav ms-auto me-3 me-lg-4">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="fas fa-user fa-fw"></i>
                </a>
                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                    <li><a class="dropdown-item" href="#!">个人中心</a></li>
                    <li><hr class="dropdown-divider" /></li>
                    <li><a class="dropdown-item" href="login.html">退出登录</a></li>
                </ul>
            </li>
        </ul>
    </nav>

    <!-- 左侧菜单栏 -->
    <div id="layoutSidenav">
        <div id="layoutSidenav_nav">
            <nav class="sb-sidenav accordion sb-sidenav-dark" id="sidenavAccordion">
                <div class="sb-sidenav-menu">
                    <div class="nav">
                        <div class="sb-sidenav-menu-heading">核心功能</div>
                        <a class="nav-link" href="index.html">
                            <div class="sb-nav-link-icon"><i class="fas fa-tachometer-alt"></i></div>
                            首页
                        </a>
                        <a class="nav-link active" href="survey.html">
                            <div class="sb-nav-link-icon"><i class="fas fa-clipboard-list"></i></div>

                        </a>
                        <a class="nav-link" href="match.html">
                            <div class="sb-nav-link-icon"><i class="fas fa-users"></i></div>
                            加权匹配

                        <a class="nav-link" href="location.html">

                        </a>
                        <div class="sb-sidenav-menu-heading">系统管理</div>
                        <a class="nav-link" href="dorms.html">
                            <div class="sb-nav-link-icon"><i class="fas fa-home"></i></div>

                        </a>
                        <a class="nav-link" href="personal.html">

                    </div>

                <div class="sb-sidenav-footer">
                    <div class="small">Logged in as:</div>
                    学生用户
                </div>
            </nav>
        </div>

        <!-- 主内容：问卷表单 -->
        <div id="layoutSidenav_content">
            <div class="content-wrapper">
                <main>
                    <div class="container-fluid px-4">
                        <h1 class="mt-4">多维匹配问卷</h1>
                        <ol class="breadcrumb mb-4">
                            <li class="breadcrumb-item"><a href="index.html">首页</a></li>
                            <li class="breadcrumb-item active">多维问卷</li>
                        </ol>

                        <!-- 问卷表单卡片 -->
                        <div class="card form-card mb-4">
                            <div class="card-header">
                                <i class="fas fa-list-check me-1"></i>
                                请填写你的个人偏好（所有字段为必填）
                            </div>
                            <div class="card-body">
                                <form id="surveyForm">
                                    <!-- 基础信息 -->
                                    <h5 class="mb-3">基础信息</h5>
                                    <div class="row mb-3">
                                        <div class="col-md-4">
                                            <label for="gender" class="form-label">性别</label>
                                            <select class="form-select" id="gender" required>
                                                <option value="">请选择</option>
                                                <option value="男">男</option>
                                                <option value="女">女</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <label for="grade" class="form-label">年级</label>
                                            <select class="form-select" id="grade" required>
                                                <option value="">请选择</option>
                                                <option value="大一">大一</option>
                                                <option value="大二">大二</option>
                                                <option value="大三">大三</option>
                                                <option value="大四">大四</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <label for="major" class="form-label">专业类别</label>
                                            <select class="form-select" id="major" required>
                                                <option value="">请选择</option>
                                                <option value="理工科">理工科</option>
                                                <option value="文科">文科</option>
                                                <option value="商科">商科</option>
                                                <option value="艺术类">艺术类</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label for="mbti" class="form-label">MBTI 类型</label>
                                            <select class="form-select" id="mbti" required>
                                                <option value="" selected disabled>请选择...</option>
                                                    <option value="INFJ">INFJ (提倡者)</option>
                                                    <option value="INTJ">INTJ (建筑师)</option>
                                                    <option value="INFP">INFP (调停者)</option>
                                                    <option value="INTP">INTP (逻辑学家)</option>
                                                    <option value="ENFJ">ENFJ (主人公)</option>
                                                    <option value="ENTJ">ENTJ (指挥官)</option>
                                                    <option value="ENFP">ENFP (竞选者)</option>
                                                    <option value="ENTP">ENTP (辩论家)</option>
                                                    <option value="ISFJ">ISFJ (守卫者)</option>
                                                    <option value="ISFP">ISFP (探险家)</option>
                                                    <option value="ISTP">ISTP (鉴赏家)</option>
                                                    <option value="ISTJ">ISTJ (物流师)</option>
                                                    <option value="ESFJ">ESFJ (执政官)</option>
                                                    <option value="ESFP">ESFP (表演者)</option>
                                                    <option value="ESTP">ESTP (企业家)</option>
                                                    <option value="ESTJ">ESTJ (总经理)</option>
                                                    <option value="其他">其他/不确定</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="personality" class="form-label">性格倾向</label>
                                            <select class="form-select" id="personality" required>
                                                <option value="">请选择</option>
                                                <option value="非常内向">非常内向</option>
                                                <option value="偏内向">偏内向</option>
                                                <option value="中性">中性</option>
                                                <option value="偏外向">偏外向</option>
                                                <option value="非常外向">非常外向</option>
                                            </select>
                                        </div>
                                    </div>

                                    <!-- 生活习惯 -->
                                    <h5 class="mb-3">生活习惯</h5>
                                    <div class="row mb-3">
                                        <div class="col-md-4">
                                            <label for="sleepTime" class="form-label">睡觉时间</label>
                                            <select class="form-select" id="sleepTime" required>
                                                <option value="">请选择</option>
                                                <option value="22:00前">22:00前（早睡）</option>
                                                <option value="22:00-23:00">22:00-23:00（规律）</option>
                                                <option value="23:00-00:00">23:00-00:00（晚睡）</option>
                                                <option value="00:00后">00:00后（熬夜）</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <label for="cleanFreq" class="form-label">卫生打扫频率</label>
                                            <select class="form-select" id="cleanFreq" required>
                                                <option value="">请选择</option>
                                                <option value="每天">每天</option>
                                                <option value="每周2-3次">每周2-3次</option>
                                                <option value="每周1次">每周1次</option>
                                                <option value="偶尔">偶尔</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <label for="nap" class="form-label">是否午睡</label>
                                            <select class="form-select" id="nap" required>
                                                <option value="">请选择</option>
                                                <option value="是">是</option>
                                                <option value="否">否</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="row mb-3">
                                        <div class="col-md-4">
                                            <label for="smoke" class="form-label">是否吸烟</label>
                                            <select class="form-select" id="smoke" required>
                                                <option value="">请选择</option>
                                                <option value="是">是</option>
                                                <option value="否">否</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <label for="mindSmoke" class="form-label">是否介意舍友吸烟</label>
                                            <select class="form-select" id="mindSmoke" required>
                                                <option value="">请选择</option>
                                                <option value="是">是</option>
                                                <option value="否">否</option>
                                                <option value="无所谓">无所谓</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <label for="temp" class="form-label">空调偏好温度</label>
                                            <select class="form-select" id="temp" required>
                                                <option value="">请选择</option>
                                                <option value="20-22℃">20-22℃（偏凉）</option>
                                                <option value="22-24℃">22-24℃（适中）</option>
                                                <option value="24-26℃">24-26℃（偏暖）</option>
                                            </select>
                                        </div>
                                    </div>

                                    <!-- 学习娱乐 -->
                                    <h5 class="mb-3">学习娱乐</h5>
                                    <div class="row mb-3">
                                        <div class="col-md-4">
                                            <label for="studyInDorm" class="form-label">宿舍学习频率</label>
                                            <select class="form-select" id="studyInDorm" required>
                                                <option value="">请选择</option>
                                                <option value="经常">经常</option>
                                                <option value="偶尔">偶尔</option>
                                                <option value="几乎不">几乎不</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <label for="mindNoise" class="form-label">对噪音的容忍度</label>
                                            <select class="form-select" id="mindNoise" required>
                                                <option value="">请选择</option>
                                                <option value="非常介意">非常介意</option>
                                                <option value="比较介意">比较介意</option>
                                                <option value="轻微介意">轻微介意</option>
                                                <option value="无所谓">无所谓</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <label for="entertainment" class="form-label">主要娱乐方式</label>
                                            <select class="form-select" id="entertainment" required>
                                                <option value="">请选择</option>
                                                <option value="游戏">游戏</option>
                                                <option value="追剧">追剧</option>
                                                <option value="音乐">音乐</option>
                                                <option value="看书">看书</option>
                                                <option value="其他">其他</option>
                                            </select>
                                        </div>
                                    </div>

                                    <!-- 社交相处 -->
                                    <h5 class="mb-3">社交相处</h5>
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label for="activity" class="form-label">是否愿意和舍友一起活动</label>
                                            <select class="form-select" id="activity" required>
                                                <option value="">请选择</option>
                                                <option value="非常愿意">非常愿意</option>
                                                <option value="愿意">愿意</option>
                                                <option value="偶尔愿意">偶尔愿意</option>
                                                <option value="不愿意">不愿意</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label for="visitor" class="form-label">对舍友带访客的态度</label>
                                            <select class="form-select" id="visitor" required>
                                                <option value="">请选择</option>
                                                <option value="欢迎">欢迎</option>
                                                <option value="偶尔可以">偶尔可以</option>
                                                <option value="不喜欢">不喜欢</option>
                                                <option value="禁止">禁止</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="row mb-3">
                                        <div class="col-md-12">
                                            <label for="trait" class="form-label">最看重的舍友特质</label>
                                            <select class="form-select" id="trait" required>
                                                <option value="">请选择</option>
                                                <option value="规律作息">规律作息</option>
                                                <option value="爱干净">爱干净</option>
                                                <option value="安静">安静</option>
                                                <option value="性格合拍">性格合拍</option>
                                                <option value="学习上进">学习上进</option>
                                            </select>
                                        </div>
                                    </div>

                                    <!-- 提交/重置按钮 -->
                                    <div class="d-flex gap-3 mt-4">
                                        <button type="submit" class="btn btn-primary">提交问卷</button>
                                        <button type="button" class="btn btn-secondary" id="resetSurvey">重新填写问卷</button>
                                        <a href="match.html" class="btn btn-success ms-auto">去加权匹配</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </main>
                <footer class="py-4 bg-light mt-auto">
                    <div class="container-fluid px-4">
                        <div class="d-flex align-items-center justify-content-between small">
                            <div class="text-muted">Copyright &copy; 宿舍智能推荐与管理系统 2026</div>
                        </div>
                    </div>
                </footer>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 侧边栏切换
            const btn = document.getElementById('sidebarToggle');
            const layout = document.getElementById('layoutSidenav');
            if (btn && layout) {
                btn.addEventListener('click', function() {
                    layout.classList.toggle('sb-sidenav-toggled');
                });
            }

            // 读取已保存的问卷数据，回填表单
            const savedData = localStorage.getItem('userSurveyData');
            if (savedData) {
                const data = JSON.parse(savedData);
                // 遍历表单字段，回填值
                Object.keys(data).forEach(key => {
                    const element = document.getElementById(key);
                    if (element) element.value = data[key];
                });
            }

            // 提交问卷：保存数据 + 标记已提交
            const surveyForm = document.getElementById('surveyForm');
            surveyForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 收集表单数据
                const formData = {
                    gender: document.getElementById('gender').value,
                    grade: document.getElementById('grade').value,
                    major: document.getElementById('major').value,
                    mbti: document.getElementById('mbti').value,
                    personality: document.getElementById('personality').value,
                    sleepTime: document.getElementById('sleepTime').value,
                    cleanFreq: document.getElementById('cleanFreq').value,
                    nap: document.getElementById('nap').value,
                    smoke: document.getElementById('smoke').value,
                    mindSmoke: document.getElementById('mindSmoke').value,
                    temp: document.getElementById('temp').value,
                    studyInDorm: document.getElementById('studyInDorm').value,
                    mindNoise: document.getElementById('mindNoise').value,
                    entertainment: document.getElementById('entertainment').value,
                    activity: document.getElementById('activity').value,
                    visitor: document.getElementById('visitor').value,
                    trait: document.getElementById('trait').value
                };

                // 保存数据到本地
                localStorage.setItem('userSurveyData', JSON.stringify(formData));
                // 标记：问卷已提交
                localStorage.setItem('surveySubmitted', 'true');
                // 重置匹配状态（重新填写后需要重新匹配）
                localStorage.removeItem('dormMatched');
                
                alert('问卷提交成功！请前往「加权匹配」页面分配宿舍');
                window.location.href = 'match.html';
            });

            // 重新填写问卷：清空数据 + 重置表单
            document.getElementById('resetSurvey').addEventListener('click', function() {
                if (confirm('确定要重新填写问卷吗？原有数据将被清空！')) {
                    // 清空本地数据
                    localStorage.removeItem('userSurveyData');
                    localStorage.removeItem('surveySubmitted');
                    localStorage.removeItem('dormMatched');
                    localStorage.removeItem('dormInfo');
                    // 重置表单
                    surveyForm.reset();
                    alert('已清空问卷数据，可重新填写');
                }
            });
        });
    </script>
</body>
