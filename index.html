                                    </div>

                                    <div class="card-body">
                                        <div class="row no-gutters align-items-center">
                                            <div class="col mr-2">
                                                <div class="text-xs font-weight-bold text-info text-uppercase mb-1">标签画像</div>
                                                <div class="h5 mb-0 font-weight-bold text-gray-800">构建宿舍与舍友特征标签</div>

                                            <div class="col-auto">
